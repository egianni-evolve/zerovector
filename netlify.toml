[build]
  command = "npm run build"
  publish = "dist"

[dev]
  port = 3006
  framework = "#auto"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/kestrel/checkin"
  to = "/.netlify/functions/kestrel-checkin"
  status = 200

[[redirects]]
  from = "/api/kestrel/checkins"
  to = "/.netlify/functions/kestrel-checkin"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
